<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>테트리스</h1>
    </header>

    <main class="game-area">
      <section class="board-section">
        <div id="board" class="board" aria-label="게임 보드"></div>
        <p id="game-over" class="game-over" hidden>
          게임 오버
          <span>재시작 버튼을 눌러주세요</span>
        </p>
      </section>

      <aside class="sidebar">
        <div class="panel">
          <h2>점수</h2>
          <p id="score" class="score">0</p>
        </div>

        <div class="panel controls">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </div>

        <div class="panel touch-controls" aria-label="터치 조작">
          <h2>터치 조작</h2>
          <div class="touch-pad">
            <button type="button" class="touch-btn" data-action="rotate" aria-label="회전">↻</button>
            <button type="button" class="touch-btn" data-action="left" aria-label="왼쪽">←</button>
            <button type="button" class="touch-btn" data-action="down" aria-label="아래">↓</button>
            <button type="button" class="touch-btn" data-action="right" aria-label="오른쪽">→</button>
            <button type="button" class="touch-btn touch-btn-wide" data-action="drop" aria-label="즉시 낙하">즉시 낙하</button>
          </div>
        </div>

        <div class="panel help-panel">
          <h2>조작법</h2>
          <ul class="help-list">
            <li><kbd>←</kbd> : 왼쪽 이동</li>
            <li><kbd>→</kbd> : 오른쪽 이동</li>
            <li><kbd>↓</kbd> : 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> : 회전</li>
            <li><kbd>Space</kbd> : 즉시 낙하 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
